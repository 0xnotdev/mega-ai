services:
  db:
    image: pgvector/pgvector:pg16

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-megaai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-megaai_secret}
      POSTGRES_DB: ${POSTGRES_DB:-megaai}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./mega_ai/db/queries/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U megaai"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://megaai:megaai_secret@db:5432/megaai
      groq_api_key: ${groq_api_key}
      E2B_API_KEY: ${E2B_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
